<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> xin lỗi</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#1f2937,#0f0f0f 60%);
    color:white;
    padding:20px;
}
.container{
    width:100%;
    max-width:500px;
    text-align:center;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:35px 25px;
    box-shadow:
    0 10px 30px rgba(0,0,0,.4);
}
h1{
    font-size:clamp(32px,6vw,46px);
    margin-bottom:15px;
    font-weight:700;
}
p{
    color:#b7b7b7;
    font-size:16px;
    line-height:1.8;
    margin-bottom:35px;
}
.buttons{
    position:relative;
    height:120px;
}
button{
    padding:14px 28px;
    border:none;
    border-radius:14px;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}
#yesBtn{
    background:white;
    color:black;
    font-weight:700;
    box-shadow:0 8px 25px rgba(255,255,255,.15);
}
#yesBtn:hover{
    transform:translateY(-3px);
}
#noBtn{
    background:#222;
    color:white;
    border:1px solid #444;
    position:absolute;
    margin-left:20px;
}
#result{
    position:fixed;
    inset:0;
    background:#090909;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
    z-index:999;
}
#result img{
    width:min(380px,90vw);
    border-radius:20px;
    box-shadow:
    0 0 40px rgba(255,255,255,.08);
    animation:zoom .6s ease;
}
@keyframes zoom{
    from{
        opacity:0;
        transform:scale(.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
#result h2{
    margin-top:24px;
    font-size:30px;
    font-weight:700;
}
#result p{
    margin-top:10px;
    color:#9f9f9f;
}
@media (max-width:600px){
    .container{
        padding:28px 18px;
    }
    h1{
        font-size:34px;
    }
    p{
        font-size:15px;
    }
    button{
        font-size:15px;
        padding:12px 22px;
    }
    #result h2{
        font-size:24px;
    }
}
</style>
</head>
<body>
<div class="container">
    <h1> xin lỗi nhiều mà.</h1>
    <p><br>
        
    </p>
    <div class="buttons">
        <button id="yesBtn" onclick="forgive()">
            Tha thứ
        </button>
        <button id="noBtn">
            Không tha thứ
        </button>
    </div>
</div>
<div id="result">
    <img src="https://files.catbox.moe/uox3b8.png" alt="">
    <h2>Cảm ơn hẹ hẹ 😆</h2>
    <p>
        Biết mà 😎
    </p>
</div>
<audio id="music">
    <source src="https://files.catbox.moe/ie601r.mp3" type="audio/mpeg">
</audio>
<script>
const noBtn = document.getElementById("noBtn");
function moveButton(){
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);
function forgive(){
    document.getElementById("result").style.display = "flex";
    const music = document.getElementById("music");
    music.volume = 1;
    music.play().catch(() => {});
}
</script>
</body>
</html>
