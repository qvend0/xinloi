<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> xin lỗi</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    color:white;
}
.container{
    text-align:center;
    padding:20px;
}
h1{
    font-size:42px;
    margin-bottom:15px;
    letter-spacing:2px;
}
p{
    color:#bdbdbd;
    font-size:18px;
    line-height:1.8;
    margin-bottom:35px;
}
.buttons{
    position:relative;
    width:100%;
    height:120px;
}
button{
    padding:14px 28px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}
#yesBtn{
    background:white;
    color:black;
    font-weight:bold;
}
#yesBtn:hover{
    transform:scale(1.05);
}
#noBtn{
    background:#1e1e1e;
    color:white;
    border:1px solid #444;
    position:absolute;
    margin-left:20px;
}
#result{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}
#result img{
    width:340px;
    max-width:85%;
    border-radius:15px;
    animation:zoom .6s ease;
    box-shadow:0 0 30px rgba(255,255,255,.15);
}
@keyframes zoom{
    from{
        opacity:0;
        transform:scale(.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
#result h2{
    margin-top:25px;
    color:white;
    font-size:32px;
    letter-spacing:2px;
}
#result p{
    margin-top:10px;
    color:#aaa;
}
</style>
</head>
<body>
<div class="container">
    <h1>Anh xin lỗi.</h1>
    <p>
        Anh biết mình đã làm em buồn.<br>
        Anh không mong mọi thứ sẽ ổn ngay lập tức,<br>
        nhưng anh mong em cho anh một cơ hội sửa sai.
    </p>
    <div class="buttons">
        <button id="yesBtn" onclick="forgive()">
            Tha thứ
        </button>
        <button id="noBtn">
            Không tha thứ
        </button>
    </div>
</div>
<div id="result">
    <img src="https://files.catbox.moe/uox3b8.png" alt="">
    <h2>Cảm ơn hẹ hẹ</h2>
    <p>
        .
    </p>
</div>
<audio id="music">
    <source src="https://files.catbox.moe/ie601r.mp3" type="audio/mpeg">
</audio>
<script>
const noBtn = document.getElementById("noBtn");
function moveButton(){
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);
function forgive(){
    document.getElementById("result").style.display = "flex";
    const music = document.getElementById("music");
    music.volume = 1;
    music.play().catch(() => {});
}
</script>
</body>
</html>
